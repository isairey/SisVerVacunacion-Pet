<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Admin - Vetify</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .register-card {
            background: white;
            border-radius: 1.5rem;
            padding: 3rem;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }
        .register-logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .register-logo h1 {
            font-size: 1.75rem;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 0.25rem;
        }
        .register-logo p {
            color: #64748b;
            font-size: 0.9rem;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        label {
            display: block;
            font-weight: 600;
            color: #374151;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
        }
        input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e5e7eb;
            border-radius: 0.75rem;
            font-size: 0.95rem;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56,189,248,0.1);
        }
        .secret-group {
            background: #fef9ec;
            border: 2px solid #fde68a;
            border-radius: 0.75rem;
            padding: 1rem;
            margin-bottom: 1.25rem;
        }
        .secret-group label { color: #92400e; }
        .secret-group input {
            border-color: #fde68a;
            background: white;
        }
        .secret-group input:focus { border-color: #f59e0b; }
        .btn-register {
            width: 100%;
            padding: 0.875rem;
            background: linear-gradient(135deg, #38bdf8 0%, #0284c7 100%);
            color: white;
            border: none;
            border-radius: 0.75rem;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 0.5rem;
        }
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(2,132,199,0.4);
        }
        .login-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: #64748b;
        }
        .login-link a {
            color: #0284c7;
            font-weight: 600;
            text-decoration: none;
        }
        .messages { margin-bottom: 1rem; }
        .message-error {
            background: #fee2e2;
            color: #991b1b;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            border-left: 4px solid #ef4444;
        }
    </style>
</head>
<body>
    <div class="register-card">
        <div class="register-logo">
            <h1><i class="bi bi-shield-lock"></i> Vetify Admin</h1>
            <p>Crea tu cuenta de administrador</p>
        </div>

        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="message-error">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="secret-group">
                <label><i class="bi bi-key"></i> Clave Secreta *</label>
                <input type="password" name="secret_key" required placeholder="Ingresa la clave secreta">
            </div>

            <div class="form-group">
                <label><i class="bi bi-person"></i> Usuario *</label>
                <input type="text" name="username" required placeholder="nombre_admin">
            </div>

            <div class="form-group">
                <label><i class="bi bi-envelope"></i> Email *</label>
                <input type="email" name="email" required placeholder="admin@vetify.com">
            </div>

            <div class="form-group">
                <label><i class="bi bi-lock"></i> Contraseña *</label>
                <input type="password" name="password" required placeholder="••••••••">
            </div>

            <div class="form-group">
                <label><i class="bi bi-lock-fill"></i> Confirmar Contraseña *</label>
                <input type="password" name="password2" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn-register">
                <i class="bi bi-person-plus"></i> Crear Cuenta Admin
            </button>
        </form>

        <div class="login-link">
            ¿Ya tienes cuenta? <a href="{% url 'admin_dashboard:admin_login' %}">Iniciar sesión</a>
        </div>
    </div>
</body>
</html>
