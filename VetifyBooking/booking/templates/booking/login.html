{% extends 'booking/base.html' %}

{% block title %}Iniciar Sesión - Vetify Booking{% endblock %}

{% block content %}
<section class="auth-page">
    <div class="auth-wrapper">

        <div class="auth-card">

            <div class="auth-header">
                <i class="bi bi-shield-lock auth-main-icon"></i>
                <h2>Bienvenido de nuevo</h2>
                <p>Inicia sesión para gestionar tus citas</p>
            </div>

            <form method="post" class="auth-form">
                {% csrf_token %}

                <div class="form-group">
                    <label>Usuario</label>
                    <div class="input-group">
                        <i class="bi bi-person"></i>
                        <input type="text" name="username" required placeholder="Ingresa tu usuario">
                    </div>
                </div>

                <div class="form-group">
                    <label>Contraseña</label>
                    <div class="input-group">
                        <i class="bi bi-lock"></i>
                        <input type="password" name="password" required placeholder="Ingresa tu contraseña">
                    </div>
                </div>

                <button type="submit" class="auth-btn">
                    <i class="bi bi-box-arrow-in-right"></i> Iniciar sesión
                </button>

                <p class="auth-footer">
                    ¿No tienes una cuenta?
                    <a href="{% url 'register' %}">Crear una</a>
                </p>

            </form>

        </div>

    </div>
</section>
{% endblock %}
